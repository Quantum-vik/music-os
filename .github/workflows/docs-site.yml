name: Docs site

# Builds the mdBook from docs/ and publishes to GitHub Pages.
# One-time setup: repo Settings -> Pages -> Source: "GitHub Actions".
on:
  push:
    branches: [main]
    paths: ["docs/**", "book.toml", ".github/workflows/docs-site.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook
      - run: mdbook build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Non-blocking until Pages is enabled (Settings -> Pages -> Source:
    # "GitHub Actions"). Note: enabling it makes the docs publicly reachable.
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
