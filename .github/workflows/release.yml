name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install ALSA headers (cpal)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - uses: Swatinem/rust-cache@v2
      # CLI, MCP server, and the MusicOS Player CLAP plugin.
      - run: cargo build --release --target ${{ matrix.target }} -p musicos-cli -p musicos-server -p musicos-player
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          BIN_DIR="target/${{ matrix.target }}/release"
          NAME="musicos-${GITHUB_REF_NAME}-${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$BIN_DIR/musicos_player.dll" "dist/MusicOS Player-${{ matrix.target }}.clap"
            7z a "dist/${NAME}.zip" "$BIN_DIR/music.exe" "$BIN_DIR/music-server.exe" README.md LICENSE-MIT LICENSE-APACHE
          else
            EXT=so; [ "${{ runner.os }}" = "macOS" ] && EXT=dylib
            cp "$BIN_DIR/libmusicos_player.$EXT" "dist/MusicOS Player-${{ matrix.target }}.clap"
            tar czf "dist/${NAME}.tar.gz" -C "$BIN_DIR" music music-server -C "$GITHUB_WORKSPACE" README.md LICENSE-MIT LICENSE-APACHE
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  # Installable desktop bundles (.dmg/.app, .msi, .deb/.AppImage), uploaded
  # to the same tag's release by tauri-action.
  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libwebkit2gtk-4.1-dev libgtk-3-dev
      - uses: Swatinem/rust-cache@v2
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
