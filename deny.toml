# cargo-deny configuration (see docs/01 NFR-8). Tightened as real deps land.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Tauri's Linux backend depends on the gtk-rs GTK3 bindings, which are
# flagged "unmaintained" (not vulnerable) upstream. Every Tauri 2 app
# inherits these until wry moves off GTK3; re-audit when tauri does.
ignore = [
    "RUSTSEC-2024-0370",
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "Unlicense",             # midly
    "CDLA-Permissive-2.0",  # webpki-roots (Mozilla CA bundle, via ureq/rustls)
]
# GPL-family deliberately absent: the VST3 host crate will carry its own
# exception when it lands (docs/09 §3), isolated from the rest of the graph.

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal `{ workspace = true }` path deps have no version and would count
# as wildcards; this permits that for unpublished path dependencies only.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
